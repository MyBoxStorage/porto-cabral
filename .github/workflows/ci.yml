name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Typecheck + Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Build check
        run: npm run build
        env:
          # Variáveis mínimas para o build não falhar por validações de runtime
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || 'ci-placeholder-secret-32chars' }}
          PC_DATABASE_URL: ${{ secrets.PC_DATABASE_URL || 'postgresql://ci:ci@localhost/ci' }}
          NEXT_PUBLIC_PC_SITE_URL: 'https://porto-cabral.vercel.app'
          NEXTAUTH_URL: 'https://porto-cabral.vercel.app'
          PC_NEXTAUTH_SECRET: 'ci-placeholder-nextauth-secret-32chars'
